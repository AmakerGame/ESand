name: EE
description: "Advanced Sandbox Game with AI integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  # Використовуємо актуальну версію для стабільної роботи
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Додаємо бібліотеки, які потрібні для твого проекту:
  http: ^1.1.0               # Для запитів до Gemini API
  shared_preferences: ^2.2.2  # Для збереження API-ключа та налаштувань гри
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Використовуємо lints версії 3.0.0 для кращої сумісності з Flutter 3.x
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Якщо у тебе будуть картинки або кастомні шрифти, 
  # розкоментуй ці рядки нижче:
  # assets:
  #   - assets/images/